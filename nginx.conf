events {

    worker_connections  1024;
}


http {
    server {
        listen 80;
        server_name tagooledavid.tech;

        # Health check endpoint
        location / {
    return 200 "Server is running\n";
        }

        # Serve Certbot ACME challenges (required for validation)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri $uri/ =404;
        }


        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }



        # App one endpoint
        location /app_one/ {
            proxy_pass http://one_app:8000/;

            add_header X-Upstream $upstream_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # App four endpoint
        location /app_four/ {
            proxy_pass http://four_app:8000/api/;

            add_header X-Upstream $upstream_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
}

    server {
        listen 443 ssl;
        server_name tagooledavid.tech;

        # SSL certificate paths (from Certbot)
        ssl_certificate     /etc/letsencrypt/live/tagooledavid.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tagooledavid.tech/privkey.pem;


        # Recommended security (modern + strong)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;


        # Health check endpoint
        location / {
    return 200 "Server is running from https baby.. \n";
        }


        # App one endpoint
        location /app_one/ {
            proxy_pass http://one_app:8000/;

            add_header X-Upstream $upstream_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # App four endpoint
        location /app_four/ {
            proxy_pass http://four_app:8000/api/;

            add_header X-Upstream $upstream_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

    }
}




